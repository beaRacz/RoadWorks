<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- ===== SHARED NAVBAR FRAGMENT ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid px-4">

        <!-- Brand -->
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="bi bi-cone-striped text-warning me-2"></i>RoadWorks Manager
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <!-- Left nav -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/roadworks">
                        <i class="bi bi-tools me-1"></i>Road Works
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link position-relative" href="/alerts">
                        <i class="bi bi-bell me-1"></i>Alerts
                        <span th:if="${unreadAlertCount != null and unreadAlertCount > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:text="${unreadAlertCount}">0</span>
                    </a>
                </li>
                <!-- Admin menu -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-shield-lock me-1"></i>Admin
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li><a class="dropdown-item" href="/admin/users">
                            <i class="bi bi-people me-2"></i>Users
                        </a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/h2-console" target="_blank">
                            <i class="bi bi-database me-2"></i>H2 Console
                        </a></li>
                    </ul>
                </li>
            </ul>

            <!-- Right nav - user info & logout -->
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                        <li>
                            <span class="dropdown-item-text text-muted small">
                                <span sec:authorize="hasRole('ADMIN')"><i class="bi bi-shield-fill-check text-warning me-1"></i>Administrator</span>
                                <span sec:authorize="hasRole('SUPERVISOR')"><i class="bi bi-person-badge me-1"></i>Supervisor</span>
                                <span sec:authorize="hasRole('VIEWER')"><i class="bi bi-eye me-1"></i>Viewer</span>
                            </span>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Sign Out
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
