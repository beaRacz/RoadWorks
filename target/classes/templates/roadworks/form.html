<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isNew} ? 'New Work' : 'Edit Work'"> RoadWorks Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width:800px;">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/roadworks">Works</a></li>
            <li class="breadcrumb-item active" th:text="${isNew} ? 'New Work' : 'Edit'">-</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-warning bg-opacity-25">
            <h5 class="fw-bold mb-0">
                <i th:class="${isNew} ? 'bi bi-plus-circle me-2' : 'bi bi-pencil-square me-2'"></i>
                <span th:text="${isNew} ? 'Add New Work' : 'Edit Work'">-</span>
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="${isNew} ? '/roadworks/new' : '/roadworks/' + roadWork.id + '/edit'"
                  th:object="${roadWork}" method="post">

                <!-- ---- Road information ---- -->
                <h6 class="fw-semibold text-muted mb-3">
                    <i class="bi bi-map me-2"></i>Road information
                </h6>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Road name <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{roadName}" class="form-control"
                               th:classappend="${#fields.hasErrors('roadName')} ? 'is-invalid'"
                               placeholder="ex: Autostrada A1, DN1">
                        <div th:if="${#fields.hasErrors('roadName')}" class="invalid-feedback"
                             th:errors="*{roadName}">-</div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Road code</label>
                        <input type="text" th:field="*{roadCode}" class="form-control"
                               placeholder="A1, DN1, DJ102">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">County</label>
                        <input type="text" th:field="*{county}" class="form-control"
                               placeholder="ex: Prahova">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Section description</label>
                        <input type="text" th:field="*{sectionDescription}" class="form-control"
                               placeholder="e.g.: Carriageway repairs and lane markings km 45-52">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Start km <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{startKm}" class="form-control"
                               th:classappend="${#fields.hasErrors('startKm')} ? 'is-invalid'"
                               min="0">
                        <div th:if="${#fields.hasErrors('startKm')}" class="invalid-feedback"
                             th:errors="*{startKm}">-</div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">End km <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{endKm}" class="form-control"
                               th:classappend="${#fields.hasErrors('endKm')} ? 'is-invalid'"
                               min="0">
                        <div th:if="${#fields.hasErrors('endKm')}" class="invalid-feedback"
                             th:errors="*{endKm}">-</div>
                    </div>
                    <div class="col-md-6">
                           <label class="form-label">Contractor</label>
                        <input type="text" th:field="*{contractorName}" class="form-control"
                               placeholder="Contractor company name">
                    </div>
                </div>

                <hr class="my-3">

                <!-- ---- Repair period ---- -->
                <h6 class="fw-semibold text-muted mb-3">
                    <i class="bi bi-calendar-range me-2"></i>Repair period
                </h6>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Start date <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{repairStartDate}" class="form-control"
                               th:classappend="${#fields.hasErrors('repairStartDate')} ? 'is-invalid'">
                        <div th:if="${#fields.hasErrors('repairStartDate')}" class="invalid-feedback"
                             th:errors="*{repairStartDate}">-</div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">End date <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{repairEndDate}" class="form-control"
                               th:classappend="${#fields.hasErrors('repairEndDate')} ? 'is-invalid'">
                        <div th:if="${#fields.hasErrors('repairEndDate')}" class="invalid-feedback"
                             th:errors="*{repairEndDate}">-</div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Status</label>
                        <select th:field="*{status}" class="form-select">
                            <option th:each="s : ${statuses}"
                                    th:value="${s.name()}"
                                    th:text="${s.label}">-</option>
                        </select>
                    </div>
                </div>

                <hr class="my-3">

                <!-- ---- Temporary signs ---- -->
                <h6 class="fw-semibold text-muted mb-3">
                    <i class="bi bi-signpost-2 me-2"></i>Temporary traffic signs
                </h6>
                <div class="row g-3 mb-4">
                    <div class="col-md-4 d-flex align-items-center">
                        <div class="form-check form-switch">
                            <input type="checkbox" th:field="*{temporarySignsPlaced}"
                                   class="form-check-input" role="switch" id="signsPlaced">
                            <label class="form-check-label" for="signsPlaced">Signs placed</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Placement date</label>
                        <input type="date" th:field="*{signsPlacedDate}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Removal deadline</label>
                        <input type="date" th:field="*{signsExpectedRemovalDate}" class="form-control">
                    </div>
                    <div class="col-md-4 d-flex align-items-center">
                        <div class="form-check form-switch">
                            <input type="checkbox" th:field="*{temporarySignsRemoved}"
                                   class="form-check-input" role="switch" id="signsRemoved">
                            <label class="form-check-label" for="signsRemoved">Signs removed</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Actual removal date</label>
                        <input type="date" th:field="*{signsRemovedDate}" class="form-control">
                    </div>
                </div>

                <hr class="my-3">

                <!-- ---- Notes ---- -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Notes / Remarks</label>
                    <textarea th:field="*{notes}" class="form-control" rows="3"
                              placeholder="Additional information..."></textarea>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2 justify-content-end">
                    <a href="/roadworks" class="btn btn-outline-secondary">
                        <i class="bi bi-x me-1"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-warning fw-semibold">
                        <i th:class="${isNew} ? 'bi bi-save me-1' : 'bi bi-check2 me-1'"></i>
                        <span th:text="${isNew} ? 'Save' : 'Update'">-</span>
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
