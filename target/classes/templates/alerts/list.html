<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts – RoadWorks Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">
            <i class="bi bi-bell-fill me-2 text-warning"></i>Alerts
            <span th:if="${unreadAlertCount > 0}"
                  class="badge bg-danger ms-2 fs-6" th:text="${unreadAlertCount}">0</span>
        </h2>
        <form th:action="@{/alerts/read-all}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-check2-all me-1"></i>Mark all as read
            </button>
        </form>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}">OK</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${alerts.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5 text-muted">
            <i class="bi bi-bell-slash fs-1"></i>
            <p class="mt-3">No alerts found.</p>
        </div>
    </div>

    <div th:unless="${alerts.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th style="width:40px;"></th>
                    <th>Type</th>
                    <th>Message</th>
                    <th>Work</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="alert : ${alerts}"
                    th:classappend="${!alert.read} ? 'fw-semibold' : 'text-muted'">
                    <td class="text-center">
                        <i th:if="${alert.alertType.name() == 'EXPIRING_3_DAYS'}" class="bi bi-alarm-fill text-danger fs-5"></i>
                        <i th:if="${alert.alertType.name() == 'EXPIRING_7_DAYS'}" class="bi bi-alarm text-warning fs-5"></i>
                        <i th:if="${alert.alertType.name() == 'EXPIRED'}" class="bi bi-x-octagon-fill text-danger fs-5"></i>
                        <i th:if="${alert.alertType.name() == 'SIGNS_NOT_REMOVED'}" class="bi bi-signpost-2-fill text-danger fs-5"></i>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${alert.alertType.name() == 'EXPIRING_3_DAYS' or alert.alertType.name() == 'EXPIRED' or alert.alertType.name() == 'SIGNS_NOT_REMOVED'} ? 'bg-danger' : 'bg-warning text-dark'"
                              th:text="${alert.alertType.label}">-</span>
                    </td>
                    <td class="small" style="max-width:350px;" th:text="${alert.message}">-</td>
                    <td class="small">
                        <a th:href="@{/roadworks/{id}(id=${alert.roadWork.id})}"
                           th:text="${alert.roadWork.roadName + ' km' + alert.roadWork.startKm + '-' + alert.roadWork.endKm}">-</a>
                    </td>
                    <td class="small text-nowrap"
                        th:text="${#temporals.format(alert.createdAt,'dd.MM.yyyy HH:mm')}">-</td>
                    <td>
                        <span th:if="${alert.read}" class="badge bg-secondary">Read</span>
                        <span th:unless="${alert.read}" class="badge bg-primary">New</span>
                    </td>
                    <td>
                        <form th:if="${!alert.read}"
                              th:action="@{/alerts/{id}/read(id=${alert.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-check2"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer text-muted small">
            Total: <strong th:text="${alerts.size()}">0</strong> alerts.
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
