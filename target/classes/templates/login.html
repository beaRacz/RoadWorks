<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – RoadWorks Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card shadow-lg border-0" style="width:420px; border-radius:16px; overflow:hidden;">
    <!-- Header -->
    <div class="card-header bg-warning text-dark text-center py-4">
        <i class="bi bi-cone-striped display-5"></i>
        <h4 class="fw-bold mt-2 mb-0">RoadWorks Manager</h4>
        <small class="text-muted">National road works management</small>
    </div>

    <!-- Form -->
    <div class="card-body p-4">
        <!-- Error / Logout messages -->
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Incorrect username or password.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            You have been logged out successfully.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">
                    <i class="bi bi-person me-1"></i>Username
                </label>
                <input type="text" id="username" name="username"
                       class="form-control form-control-lg"
                       placeholder="ex: admin" autofocus required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i>Password
                </label>
                <input type="password" id="password" name="password"
                       class="form-control form-control-lg"
                       placeholder="••••••••" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-warning btn-lg fw-bold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </div>
        </form>
    </div>

    <div class="card-footer text-center text-muted small py-3 bg-light">
        Demo: <code>admin / admin123</code> &nbsp;|&nbsp; <code>ionescu / password123</code>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
