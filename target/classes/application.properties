spring.application.name=RoadWorks Manager

# H2 Database
spring.datasource.url=jdbc:h2:mem:roadworksdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Scheduled tasks - run daily at 08:00
roadworks.alert.schedule.cron=0 0 8 * * *
# Days before expiry to trigger warning
roadworks.alert.warning.days=7
roadworks.alert.critical.days=3