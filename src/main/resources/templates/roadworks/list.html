<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Works – RoadWorks Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-tools me-2 text-warning"></i>Road Works</h2>
        <a href="/roadworks/new" class="btn btn-warning fw-semibold">
            <i class="bi bi-plus-circle me-1"></i>New Work
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}">OK</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form method="get" action="/roadworks" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">All statuses</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s.name()}"
                                th:text="${s.label}"
                                th:selected="${s.name() == selectedStatus}">-</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">County</label>
                    <input type="text" name="county" class="form-control form-control-sm"
                           placeholder="ex: Prahova" th:value="${selectedCounty}">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Road code</label>
                    <input type="text" name="roadCode" class="form-control form-control-sm"
                           placeholder="ex: A1, DN1" th:value="${selectedRoadCode}">
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm flex-grow-1">
                        <i class="bi bi-funnel me-1"></i>Filter
                    </button>
                    <a href="/roadworks" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-x"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${roadWorks.isEmpty()}" class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-1"></i>
                <p class="mt-3">No road works found.</p>
                <a href="/roadworks/new" class="btn btn-warning">Add first work</a>
            </div>
            <div th:unless="${roadWorks.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Road / Section</th>
                        <th>County</th>
                        <th>Km</th>
                        <th>Repair period</th>
                        <th>Status</th>
                        <th>Temporary signs</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="rw : ${roadWorks}"
                        th:classappend="${rw.expired and (rw.status.name() == 'IN_PROGRESS' or rw.status.name() == 'EXTENDED')} ? 'table-danger' :
                                        (${rw.daysUntilExpiry <= 3 and rw.daysUntilExpiry >= 0} ? 'table-danger' :
                                        (${rw.daysUntilExpiry <= 7 and rw.daysUntilExpiry >= 0} ? 'table-warning' : ''))">
                        <td class="text-muted small" th:text="${rw.id}">-</td>
                        <td>
                            <div class="fw-semibold" th:text="${rw.roadName}">-</div>
                            <div class="small text-muted" th:text="${rw.sectionDescription}">-</div>
                        </td>
                        <td th:text="${rw.county}">-</td>
                        <td class="small">
                            <span th:text="${rw.startKm}">0</span>–<span th:text="${rw.endKm}">0</span>
                        </td>
                        <td class="small">
                            <span th:text="${#temporals.format(rw.repairStartDate, 'dd.MM.yyyy')}">-</span>
                            <i class="bi bi-arrow-right mx-1 text-muted"></i>
                            <span th:text="${#temporals.format(rw.repairEndDate, 'dd.MM.yyyy')}">-</span>
                            <div th:if="${rw.status.name() == 'IN_PROGRESS' or rw.status.name() == 'EXTENDED'}" class="mt-1">
                                  <span th:if="${rw.expired}" class="badge bg-danger">EXPIRED</span>
                                <span th:unless="${rw.expired}"
                                      class="badge"
                                      th:classappend="${rw.daysUntilExpiry <= 3} ? 'bg-danger' : (${rw.daysUntilExpiry <= 7} ? 'bg-warning text-dark' : 'bg-secondary')"
                                      th:text="${rw.daysUntilExpiry} + ' days'">-</span>
                            </div>
                        </td>
                        <td>
                            <span class="badge status-badge"
                                  th:classappend="${rw.status.name() == 'IN_PROGRESS'} ? 'bg-success' :
                                                  (${rw.status.name() == 'PLANNED'} ? 'bg-info text-dark' :
                                                  (${rw.status.name() == 'COMPLETED'} ? 'bg-secondary' :
                                                  (${rw.status.name() == 'EXTENDED'} ? 'bg-warning text-dark' : 'bg-dark')))"
                                  th:text="${rw.status.label}">-</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${!rw.temporarySignsPlaced}" class="text-muted small">-</span>
                            <span th:if="${rw.temporarySignsPlaced and rw.temporarySignsRemoved}"
                                  class="badge bg-success">
                                <i class="bi bi-check-lg me-1"></i>Removed
                            </span>
                            <span th:if="${rw.temporarySignsPlaced and !rw.temporarySignsRemoved and !rw.signsLate}"
                                  class="badge bg-warning text-dark">
                                <i class="bi bi-cone-striped me-1"></i>Placed
                            </span>
                            <span th:if="${rw.signsLate}"
                                  class="badge bg-danger">
                                <i class="bi bi-exclamation-triangle me-1"></i>NOT REMOVED!
                            </span>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/roadworks/{id}(id=${rw.id})}"
                                   class="btn btn-outline-primary" title="Details">
                                    <i class="bi bi-search"></i>
                                </a>
                                <a th:href="@{/roadworks/{id}/edit(id=${rw.id})}"
                                   class="btn btn-outline-secondary" title="Edit"
                                   sec:authorize="hasAnyRole('ADMIN','SUPERVISOR')">
                                    <i class="bi bi-pencil"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer text-muted small" th:unless="${roadWorks.isEmpty()}">
            Total: <strong th:text="${roadWorks.size()}">0</strong> works displayed.
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
