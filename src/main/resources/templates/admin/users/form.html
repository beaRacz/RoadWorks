<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isNew} ? 'New User' : 'Edit User'">RoadWorks Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width:600px;">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/users">Users</a></li>
            <li class="breadcrumb-item active"
                th:text="${isNew} ? 'New User' : 'Edit'">-</li>
        </ol>
    </nav>

    <!-- Flash -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-warning bg-opacity-25">
            <h5 class="fw-bold mb-0">
                <i th:class="${isNew} ? 'bi bi-person-plus me-2' : 'bi bi-person-gear me-2'"></i>
                <span th:text="${isNew} ? 'New User' : 'Edit User: ' + user.username">-</span>
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="${isNew} ? '/admin/users/new' : '/admin/users/' + user.id + '/edit'"
                  method="post">

                <!-- Username (only for new) -->
                <div class="mb-3" th:if="${isNew}">
                    <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control"
                           placeholder="ex: ionescu.ion" required minlength="3">
                </div>

                <div class="mb-3">
                          <label class="form-label fw-semibold">Full name <span class="text-danger">*</span></label>
                    <input type="text" name="fullName" class="form-control"
                              th:value="${user.fullName}" placeholder="e.g.: John Doe" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control"
                           th:value="${user.email}" placeholder="email@example.com">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
                    <select name="role" class="form-select" required>
                        <option th:each="r : ${roles}"
                                th:value="${r.name()}"
                                th:text="${r.label}"
                                th:selected="${r == user.role}">-</option>
                    </select>
                </div>

                <!-- Password field -->
                <div class="mb-3" th:if="${isNew}">
                          <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                    <input type="password" name="password" class="form-control"
                              placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <div class="mb-3" th:unless="${isNew}">
                          <label class="form-label fw-semibold">New password</label>
                    <input type="password" name="newPassword" class="form-control"
                              placeholder="Leave blank to keep current password">
                          <div class="form-text">Fill in only if you want to change the password.</div>
                </div>

                <!-- Active switch (only for edit) -->
                <div class="mb-4 form-check form-switch" th:unless="${isNew}">
                    <input type="checkbox" name="active" class="form-check-input"
                           id="activeSwitch" role="switch"
                           th:checked="${user.active}">
                    <label class="form-check-label" for="activeSwitch">Active account</label>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a href="/admin/users" class="btn btn-outline-secondary">
                        <i class="bi bi-x me-1"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-warning fw-semibold">
                        <i th:class="${isNew} ? 'bi bi-save me-1' : 'bi bi-check2 me-1'"></i>
                        <span th:text="${isNew} ? 'Create' : 'Save'">-</span>
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
