<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users – RoadWorks Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-people-fill me-2 text-warning"></i>User Management</h2>
        <a href="/admin/users/new" class="btn btn-warning fw-semibold">
            <i class="bi bi-person-plus me-1"></i>New User
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}">OK</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Full name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td class="text-muted small" th:text="${u.id}">-</td>
                    <td class="fw-semibold">
                        <i class="bi bi-person-circle me-1 text-muted"></i>
                        <span th:text="${u.username}">-</span>
                    </td>
                    <td th:text="${u.fullName}">-</td>
                    <td class="small text-muted" th:text="${u.email ?: '-'}">-</td>
                    <td>
                        <span class="badge"
                              th:classappend="${u.role.name() == 'ADMIN'} ? 'bg-danger' : (${u.role.name() == 'SUPERVISOR'} ? 'bg-primary' : 'bg-secondary')"
                              th:text="${u.role.label}">-</span>
                    </td>
                    <td>
                        <span th:if="${u.active}" class="badge bg-success">Active</span>
                        <span th:unless="${u.active}" class="badge bg-secondary">Disabled</span>
                    </td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <a th:href="@{/admin/users/{id}/edit(id=${u.id})}"
                               class="btn btn-outline-secondary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Delete this user?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer text-muted small">
            Total: <strong th:text="${users.size()}">0</strong> users.
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
